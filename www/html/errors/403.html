<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>403 - Forbidden</title>
    <style>
        body { font-family: -apple-system, Arial, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { text-align: center; }
        h1 { font-size: 4rem; color: #f87171; }
        p { color: #94a3b8; margin-top: 8px; }
        a { color: #38bdf8; text-decoration: none; display: inline-block; margin-top: 16px; padding: 8px 16px; border: 1px solid #38bdf8; border-radius: 6px; }
        a:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>
    <div class="box">
        <h1>403</h1>
        <p>You don't have permission to access this resource.</p>
        <a href="/">Back to demo</a>
    </div>
</body>
</html>
