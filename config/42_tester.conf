# Tester 42 — à la racine du dépôt, place :
#   - le binaire du tester (souvent `tester` ou `ubuntu_cgi_tester`)
#   - `cgi_tester` (binaire CGI fourni par l'école)
# Puis : chmod +x cgi_tester YoupiBanane/youpi.bla
#
# Lancer le serveur depuis la racine :
#   ./webserv config/42_tester.conf
#
# youpi.bla est un script qui fait exec ../cgi_tester (répertoire courant CGI = YoupiBanane).

server {
    listen 8080;
    root ./tester_root;
    index index.html;
    # Tester POST ~100M vers youpi.bla / cgi_tester (octets, pas Mo)
    client_max_body_size 104857600;

    location / {
        root ./tester_root;
        methods GET;
    }

    location /post_body {
        methods POST;
        client_max_body_size 100;
        upload on;
        upload_path ./post_body_data;
    }

    location /directory {
        methods GET POST;
        root ./YoupiBanane;
        index youpi.bad_extension;
        cgi .bla;
        autoindex on;
    }
}
