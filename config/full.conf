server {
    listen 8080;
	  server_name site.test;
    root ./www;
    index index.html;
    client_max_body_size 2000000;

    error_page 404 ./errors/404.html;
    error_page 403 ./errors/403.html;
    error_page 500 ./errors/500.html;

    location / {
        methods GET;
    }

    location /upload {
        methods POST GET DELETE;
        upload on;
        upload_path ./upload;
        autoindex on;
    }

    location /files {
        methods GET DELETE;
        root ./upload;
        autoindex on;
    }

    location /cgi-bin {
        root ./www/cgi-bin;
        methods GET POST;
        cgi .py;
    }

    location /session {
      methods GET POST;
    }

    location /session/logout {
      methods GET
    }
}
