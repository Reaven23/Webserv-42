server {
    listen 8080;
	server_name site.test;
    root ./www;
    index index.html;
    client_max_body_size 2000000;

    error_page 404 ./errors/404.html;
    error_page 500 ./errors/500.html;

    location / {
        methods GET;
    }

    location /upload {
        methods POST;
        upload on;
        upload_path ./uploads;
    }

    location /files {
        autoindex on;
    }

    location /cgi-bin {
        methods GET POST;
        cgi .py;
    }
}