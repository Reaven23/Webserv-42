# ── Main site: static files, uploads, CGI, error pages ──
server {
    listen 8080;
    server_name main-site;
    root ./www;
    index index.html;
    client_max_body_size 2000000;

    error_page 404 ./www/html/errors/404.html;
    error_page 403 ./www/html/errors/403.html;
    error_page 500 ./www/html/errors/500.html;

    location / {
        root ./www/html;
        methods GET;
    }

    location /assets {
        root ./www/assets;
        methods GET;
    }

    location /upload {
        methods GET POST DELETE;
        root ./upload;
        upload on;
        upload_path ./upload;
        autoindex on;
    }

    location /files {
        methods GET DELETE;
        autoindex on;
    }

    location /cgi-bin {
        root ./www/scripts;
        methods GET POST;
        cgi .py;
    }

    location /session {
      methods GET POST;
    }

    location /session/logout {
      methods GET;
    }
}


# ── Redirects: test permanent and temporary redirects ──
server {
    listen 8081;
    server_name redirects;
    root ./www;

    location / {
        methods GET;
        root ./www/html;
    }

    location /old-page {
        redirect 301 /;
    }

    location /temp-page {
        redirect 302 /;
    }
}

# ── Read-only: GET only, autoindex, no uploads ──
server {
    listen 8082;
    server_name read-only;
    root ./www;
    index index.html;

    location / {
        root ./www/html;
        methods GET;
    }

    location /browse {
        root ./www;
        methods GET;
        autoindex on;
    }
}

# ── Uploads only: POST and DELETE, no GET ──
server {
    listen 8083;
    server_name uploads-only;
    root ./www;
    client_max_body_size 5000000;

    location / {
        root ./www/html;
        methods GET;
    }

    location /store {
        methods POST DELETE;
        upload on;
        upload_path ./upload;
    }
}

# ── CGI server: Python and JavaScript ──
server {
    listen 8084;
    server_name cgi-server;
    root ./www;

    error_page 404 ./www/html/errors/404.html;

    location / {
        root ./www/html;
        methods GET;
    }

    location /py-cgi {
        root ./www/scripts;
        methods GET POST;
        cgi .py;
        autoindex on;
    }

    location /js-cgi {
        root ./www/scripts;
        methods GET POST;
        cgi .js;
        autoindex on;
    }
}

# ── Restricted: small body limit, limited methods ──
server {
    listen 8085;
    server_name restricted;
    root ./www;
    client_max_body_size 1000;

    location / {
        root ./www/html;
        methods GET;
    }

    location /limited {
        methods POST;
        autoindex off;
    }
}
