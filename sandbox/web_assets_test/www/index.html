<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv Asset Test</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="hero">
        <img src="/images/logo.svg" alt="Webserv logo" class="logo">
        <h1>Webserv static assets test page</h1>
        <p>If CSS and JS are loaded, this page is styled and interactive.</p>
    </header>

    <main>
        <section class="card">
            <h2>Inline image test</h2>
            <img src="/images/banner.svg" alt="Banner" class="banner">
        </section>

        <section class="card">
            <h2>JS test</h2>
            <button id="actionBtn">Click me</button>
            <p id="status">Waiting for click...</p>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
